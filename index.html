<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyArena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="container">

    <h1>🎮 KeyArena</h1>
    <p>Type Faster. Fight Smarter.</p>

    <!-- START SCREEN -->
    <div id="startScreen">

        <!-- Start Button -->
        <button id="startBtn">Start Game</button>

        <br><br>

        <!-- Settings Button -->
        <button id="settingsBtn" class="settings-icon">
            <i class="fa-solid fa-gear"></i>
        </button>

        <!-- Settings Menu -->
        <div id="settingsArea" style="display:none; margin-top:20px;">

            <h3>⏱ Game Time Settings</h3>

            <label>
                <input type="radio" name="gameTime" value="15">
                15 Seconds
            </label>

            <br><br>

            <label>
                <input type="radio" name="gameTime" value="30">
                30 Seconds
            </label>

            <br><br>

            <label>
                <input type="radio" name="gameTime" value="60" checked>
                60 Seconds
            </label>

            <br><br>

            <label>
                <input type="radio" name="gameTime" value="120">
                120 Seconds
            </label>

            <hr style="margin:20px 0;">

            <h3>📖 Story Category</h3>

            <label>
                <input type="radio" name="storyCategory" value="funny" checked>
                😂 Funny
            </label>

            <br><br>

            <label>
                <input type="radio" name="storyCategory" value="horror">
                👻 Horror
            </label>

            <br><br>

            <label>
                <input type="radio" name="storyCategory" value="adventure">
                🏕 Adventure
            </label>

        </div>

    </div>

    <!-- GAME SCREEN -->
    <div id="gameArea" style="display:none; margin-top:40px;">

        <!-- Menu Button -->
        <button id="menuBtn" class="menu-icon">
            <i class="fa-solid fa-bars"></i>
        </button>

        <!-- Menu Panel -->
        <div id="menuArea" style="display:none;">

            <button id="homeBtn">🏠 Home</button>

            <button id="resumeBtn">▶ Resume</button>

            <hr style="margin:12px 0; border: 0.5px solid rgba(255,255,255,0.2);">

            <h4 style="margin-bottom:8px;">📖 Category</h4>

            <label>
                <input type="radio" name="menuStoryCategory" value="funny" checked>
                😂 Funny
            </label>

            <br>

            <label>
                <input type="radio" name="menuStoryCategory" value="horror">
                👻 Horror
            </label>

            <br>

            <label>
                <input type="radio" name="menuStoryCategory" value="adventure">
                🏕 Adventure
            </label>

        </div>

        <button id="restartBtn">Restart Game</button>

        <h2>Typing Arena</h2>

        <p id="word">apple</p>

        <p id="score">Score: 0</p>

        <p id="timer">Time: 60</p>

        <p id="message"></p>

        <input
            type="text"
            id="typingInput"
            placeholder="Type here..."
            autocomplete="off"
        >

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
