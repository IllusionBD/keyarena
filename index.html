<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyArena</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="screen">
            <h1>KeyArena</h1>
            <p>Type Faster. Fight Smarter!</p>

            <div class="options-group">
                <h3>Select Timer:</h3>
                <label><input type="radio" name="gameTime" value="15"> 15s</label>
                <label><input type="radio" name="gameTime" value="30"> 30s</label>
                <label><input type="radio" name="gameTime" value="60" checked> 60s</label>
            </div>

            <button id="startBtn" class="btn">Start Game</button>
        </div>

        <!-- Game Area -->
        <div id="gameArea" class="screen" style="display: none;">
            <div class="top-bar">
                <button id="pauseBtn" class="icon-btn"><i class="fa-solid fa-pause"></i></button>
                <button id="menuBtn" class="icon-btn"><i class="fa-solid fa-bars"></i></button>
            </div>

            <div class="status-bar">
                <span id="score">Score: 0</span>
                <span id="timer">Time: 60</span>
            </div>

            <div id="wordDisplay" class="word-box">
                <p id="word">Loading...</p>
            </div>

            <input type="text" id="typingInput" placeholder="Type here..." autocomplete="off">

            <p id="message"></p>

            <div class="controls">
                <button id="restartBtn" class="btn">Restart</button>
                <button id="readStoryBtn" class="btn" style="display: none;">Read Full Story</button>
            </div>
        </div>

        <!-- In-Game Menu Modal -->
        <div id="menuArea" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>Game Settings</h2>
                
                <div class="options-group">
                    <h3>Category:</h3>
                    <label><input type="radio" name="menuStoryCategory" value="lifehacks" checked> Life Hacks</label>
                    <label><input type="radio" name="menuStoryCategory" value="productivity"> Productivity</label>
                    <label><input type="radio" name="menuStoryCategory" value="health"> Health & Mind</label>
                </div>

                <div class="options-group">
                    <h3>Timer:</h3>
                    <label><input type="radio" name="menuGameTime" value="15"> 15s</label>
                    <label><input type="radio" name="menuGameTime" value="30"> 30s</label>
                    <label><input type="radio" name="menuGameTime" value="60"> 60s</label>
             </div>

            <button id="resumeBtn" class="btn">Resume</button>
            <button id="homeBtn" class="btn secondary">Home</button>
        </div>
    </div>
        <!-- Read Full Story Modal -->
        <div id="storyModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>Full Story</h2>
                <p id="fullStoryText"></p>
                <button id="closeModalBtn" class="btn">Close</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
